<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - JobScan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <div class="auth-card p-5">

            <!-- Logo and title -->
            <div class="text-center mb-4">
                <div class="fs-1">🛡️</div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join JobScan and stay safe from fake jobs</p>
            </div>

            <!-- Show error if signup fails -->
            {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
            {% endif %}

            <!-- Signup form — sends to /signup route -->
            <form action="/signup" method="POST">

                <!-- Full name -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text"
                           class="form-control form-control-lg"
                           name="name"
                           placeholder="Your full name"
                           required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email"
                           class="form-control form-control-lg"
                           name="email"
                           placeholder="you@example.com"
                           required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password"
                           class="form-control form-control-lg"
                           name="password"
                           placeholder="Create a password"
                           required>
                </div>

                <!-- Confirm password -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password"
                           class="form-control form-control-lg"
                           name="confirm_password"
                           placeholder="Repeat your password"
                           required>
                </div>

                <!-- Signup button -->
                <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
                    Create Account
                </button>

            </form>

            <!-- Link to login -->
            <p class="text-center mt-4 text-muted">
                Already have an account? <a href="/login" class="text-primary fw-bold">Login</a>
            </p>

            <p class="text-center">
                <a href="/" class="text-muted small">← Back to Home</a>
            </p>

        </div>
    </div>

</body>
</html>
